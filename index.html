<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitesh Kumar S | Intro</title>
    <!-- Google Fonts: Inter for a clean, modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Light Theme Variables */
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --accent-color: #0284c7; /* A professional deep sky blue */
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
            padding: 20px;
        }

        /* Container Fade-in Animation */
        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            background-color: var(--card-bg);
            padding: 50px 30px;
            border-radius: 32px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Profile Image */
        .profile-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 28px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--card-bg);
            outline: 2px solid var(--accent-color);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .profile-img:hover {
            transform: scale(1.08);
        }

        /* Typography */
        h1 {
            font-size: 2.25rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.03em;
            color: var(--text-primary);
        }

        .role-tag {
            display: inline-block;
            background-color: #f0f9ff; /* Very light blue */
            color: var(--accent-color);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 24px;
            border: 1px solid #bae6fd;
        }

        .intro-text {
            color: var(--text-secondary);
            font-size: 1.15rem;
            margin-bottom: 12px;
            font-weight: 400;
        }

        .company-highlight {
            color: var(--text-primary);
            font-weight: 600;
            background: linear-gradient(to bottom, transparent 60%, #bae6fd 60%);
            padding: 0 2px;
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-secondary);
            font-style: italic;
            margin-top: 28px;
            opacity: 0.9;
        }

        /* Social Links */
        .social-links {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 24px;
            border-top: 1px solid var(--border-color);
            padding-top: 24px;
        }

        .social-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: color 0.2s ease, transform 0.2s ease;
        }

        .social-links a:hover {
            color: var(--accent-color);
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 40px 24px;
            }
            h1 {
                font-size: 1.85rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-wrapper">
            <img src="https://i.postimg.cc/vZGvbHRb/Hitesh-Professional.png" alt="Hitesh Kumar S" class="profile-img">
        </div>

        <h1>Hitesh Kumar S</h1>
        <div class="role-tag">Full Stack Developer</div>

        <p class="intro-text">
            I have recently joined as a <br>
            <strong>Full Stack Developer</strong>
        </p>
        
        <p class="intro-text">
            Currently working at <span class="company-highlight">Sourcesys</span>
        </p>

        <p class="tagline">
            "Building and learning modern web technologies"
        </p>

        <div class="social-links">
            <a href="https://www.linkedin.com/in/hiteshkumars/">LinkedIn</a>
            <a href="https://github.com/Hitesh2810">GitHub</a>
            <a href="mailto:hiteshkumar20058@gmail.com">Contact</a>
        </div>
    </div>

    <script>
        console.log("Light Theme Intro Page Loaded for Hitesh Kumar S");
    </script>
</body>
</html>
